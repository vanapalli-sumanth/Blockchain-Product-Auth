{% extends "base.html" %}
{% block title %}Approval Pending{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 75vh; padding-top: 60px; padding-bottom: 60px;">

    <div class="card shadow-lg border-0 p-5 text-center"
         style="max-width: 500px; width: 100%; border-radius: 12px;">

        <i class="fa-solid fa-clock fa-3x text-warning mb-4"></i>

        <h3 class="fw-bold mb-3">Approval Pending</h3>

        <p class="text-muted mb-4">

            Your manufacturer account is waiting for admin approval.<br>
            You will get access once approved.

        </p>

        <a href="/logout" class="btn btn-dark w-100 py-2">
            Logout
        </a>

    </div>

</div>

{% endblock %}
